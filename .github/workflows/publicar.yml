name: publicar-json

# Genera datametrium.json (curva de futuros de VIX desde la CBOE) y lo
# commitea de vuelta al repo. El disparo lo hace cron-job.org via la API de
# GitHub (workflow_dispatch), confiable a horario fijo y maneja DST por
# timezone. No se usa el cron interno de GitHub porque dropea/demora runs.
on:
  # Disparado por cron-job.org (workflow_dispatch via API) o a mano desde Actions.
  workflow_dispatch: {}

permissions:
  contents: write          # para commitear el JSON de vuelta al repo

concurrency:
  group: publicar-json     # serializa corridas, evita pushes simultaneos
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar JSON
        run: python publicar.py

      - name: Commit y push del JSON
        run: |
          if [ -n "$(git status --porcelain datametrium.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add datametrium.json
            git commit -m "Curva VIX $(date -u +%FT%TZ)"
            git pull --rebase --autostash
            git push
          else
            echo "Sin cambios en datametrium.json."
          fi
